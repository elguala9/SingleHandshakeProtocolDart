name: single_hand_shake_protocol_monorepo
description: A Dart monorepo for Single HandShake Protocol
version: 1.7.1
publish_to: none

environment:
  sdk: '>=3.9.4 <4.0.0'

dependencies:
  shsp:
    path: packages/shsp
  stun: ^1.0.1
  json_serializable: ^6.12.0
  build_runner: ^2.10.5
  json_annotation: ^4.10.0
  meta: ^1.18.1

dev_dependencies:
  melos: ^7.4.0
  lints: ^6.0.0
  test: ^1.29.0

workspace:
  - packages/shsp
  - packages/tests

# Melos configuration for workspace
melos:
  command:
    bootstrap:
      environment:
        sdk: ">=3.3.0 <4.0.0"
      
    version:
      # Only allow versioning to happen on main branch.
      branch: main
      # Generate commit links in package changelogs.
      linkToCommits: false
      # Changelog formatting.
      message: "chore(release): publish packages"

  scripts:
    # Analyze all packages
    analyze:
      run: melos exec -- dart analyze .
      description: Run Dart analyzer in all packages.
      
    # Analyze all packages with detailed output
    analyze:all:
      run: melos exec --scope="types,interfaces,implementations,tests" -- dart analyze . --fatal-infos
      description: Analyze all packages with detailed output.
      
    # Format all packages
    format:
      run: melos exec -- dart format .
      description: Format all Dart files.
      
    # === TEST COMMANDS ===
    
    # Run all tests
    test:
      run: melos exec --fail-fast -- dart test
      description: Run all tests in packages that have them.
      packageFilters:
        dirExists: test
        
    # Run tests in specific packages
    test:types:
      run: melos exec --fail-fast --scope="types" -- dart test  
      description: Run tests in shsp_types package only.
      
    test:implementations:
      run: melos exec --fail-fast --scope="implementations" -- dart test
      description: Run tests in shsp_implementations package only.
      
    test:all:
      run: melos exec --fail-fast --scope="tests" -- dart test
      description: Run all tests in shsp_tests package.
      
    # Run tests with coverage
    test:coverage:
      run: melos exec --fail-fast -- dart test --coverage=coverage
      description: Run tests with coverage collection.
      packageFilters:
        dirExists: test
        
    # Run tests in verbose mode
    test:verbose:
      run: melos exec --fail-fast -- dart test --reporter=expanded
      description: Run tests with verbose output.
      packageFilters:
        dirExists: test
      
    # === DEVELOPMENT COMMANDS ===
      
    # Check formatting
    format:check:
      run: melos exec -- dart format --set-exit-if-changed .
      description: Check formatting in all packages.
      
    # Get dependencies for all packages
    get:
      run: melos exec -- dart pub get
      description: Get dependencies for all packages.
      
    # Clean all packages
    clean:
      run: melos clean
      description: Clean all packages.
      
    # Run build_runner for code generation
    build:
      run: melos exec -- dart run build_runner build --delete-conflicting-outputs
      description: Run build_runner in all applicable packages.
      packageFilters:
        dependsOn: build_runner
        
    # Watch mode for build_runner
    build:watch:
      run: melos exec -- dart run build_runner watch --delete-conflicting-outputs
      description: Run build_runner in watch mode.
      packageFilters:
        dependsOn: build_runner
        
    # Complete CI pipeline
    ci:
      run: melos clean && melos get && melos analyze && melos format:check && melos test
      description: Run complete CI pipeline (clean, get, analyze, format check, test).
      
    # Quick development check  
    check:
      run: melos analyze && melos test
      description: Quick check for development (analyze + all tests).
    # Generate barrel files for all packages
    barrels:
      run: melos exec --ignore=shsp_tests -- dart pub run index_generator
      description: Generate barrel files (indexes) for all packages using index_generator.

    # === DOCKER NAT TESTING COMMANDS ===

    # Setup Docker NAT testing
    docker:test:setup:
      run: bash docker_test/setup.sh
      description: Setup Docker environment for NAT testing (one-time setup).

    # Run all NAT type tests
    docker:test:all:
      run: bash docker_test/run_all_tests.sh
      description: Run all 4 NAT type tests (Full Cone, Address Restricted, Port Restricted, Symmetric).

    # Run specific NAT type test
    docker:test:full_cone:
      run: cd docker_test && export NAT_TYPE=full_cone && docker-compose up --abort-on-container-exit
      description: Run Full Cone NAT test.

    docker:test:address_restricted:
      run: cd docker_test && export NAT_TYPE=address_restricted && docker-compose up --abort-on-container-exit
      description: Run Address Restricted Cone NAT test.

    docker:test:port_restricted:
      run: cd docker_test && export NAT_TYPE=port_restricted && docker-compose up --abort-on-container-exit
      description: Run Port Restricted Cone NAT test.

    docker:test:symmetric:
      run: cd docker_test && export NAT_TYPE=symmetric && docker-compose up --abort-on-container-exit
      description: Run Symmetric NAT test.

    # View Docker test results
    docker:test:results:
      run: bash docker_test/scripts/view_results.sh docker_test/results
      description: Display Docker NAT test results in JSON format.

    # Clean Docker test artifacts
    docker:test:clean:
      run: cd docker_test && docker-compose down && rm -rf results/
      description: Stop Docker containers and clean test results.
