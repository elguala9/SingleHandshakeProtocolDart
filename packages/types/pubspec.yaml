name: shsp_types
description: Type definitions and serializable models for Single HandShake Protocol (SHSP) - a custom networking protocol for peer-to-peer communication.
version: 1.1.0
homepage: https://github.com/lgualandi/SingleHandShakeProtocolDart
repository: https://github.com/lgualandi/SingleHandShakeProtocolDart
issue_tracker: https://github.com/lgualandi/SingleHandShakeProtocolDart/issues
license: LGPL-3.0-only
keywords:
  - networking
  - peer-to-peer
  - shsp
  - protocol
  - types
  - serialization
resolution: workspace

environment:
  sdk: '>=3.5.0 <4.0.0'

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

dependencies:
  json_annotation: ^4.10.0
  callback_handler: ^0.0.3

dev_dependencies:
  lints: ^6.0.0
  test: ^1.29.0
  index_generator: 4.1.2

index_generator:
  exclude:
    - "**/test/**"
  libraries:
    - directory_path: lib
