name: shsp_implementations
description: Complete implementation of Single HandShake Protocol (SHSP) - provides UDP sockets, handshake logic, and utilities for peer-to-peer networking.
version: 1.3.0
homepage: https://github.com/lgualandi/SingleHandShakeProtocolDart
repository: https://github.com/lgualandi/SingleHandShakeProtocolDart
issue_tracker: https://github.com/lgualandi/SingleHandShakeProtocolDart/issues
license: LGPL-3.0-only
keywords:
  - networking
  - peer-to-peer
  - shsp
  - protocol
  - udp
  - handshake
  - implementation
resolution: workspace

environment:
  sdk: '>=3.5.0 <4.0.0'

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

dependencies:
  json_annotation: ^4.10.0
  shsp_types: ^1.0.7
  shsp_interfaces: ^1.2.0
  meta: ^1.18.1
  clock_dart: ^1.0.0
  stun: ^1.0.1
  callback_handler: ^0.0.3
  archive: ^3.6.1

dev_dependencies:
  build_runner: ^2.10.5
  json_serializable: ^6.12.0
  lints: ^6.0.0
  test: ^1.29.0
  index_generator: 4.1.2

index_generator:
  exclude:
    - "**/test/**"
  libraries:
    - directory_path: lib
