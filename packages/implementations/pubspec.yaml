name: shsp_implementations
description: Complete implementation of Single HandShake Protocol (SHSP) - provides UDP sockets, handshake logic, and utilities for peer-to-peer networking.
version: 1.0.0
homepage: https://github.com/lgualandi/SingleHandShakeProtocolDart
repository: https://github.com/lgualandi/SingleHandShakeProtocolDart
issue_tracker: https://github.com/lgualandi/SingleHandShakeProtocolDart/issues

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  json_annotation: ^4.9.0
  shsp_types: ^1.0.0
  shsp_interfaces: ^1.0.0
  meta: ^1.17.0
  clock_dart: ^1.0.0
  stun: ^1.0.0

dev_dependencies:
  build_runner: ^2.10.2
  json_serializable: ^6.11.1
  lints: ^3.0.0
  test: ^1.24.0
  index_generator: 4.1.2
