name: shsp
description: Single HandShake Protocol (SHSP) - a custom networking protocol for peer-to-peer communication. Unified package containing types, interfaces, and implementations.
version: 2.0.0
homepage: https://github.com/lgualandi/SingleHandShakeProtocolDart
repository: https://github.com/lgualandi/SingleHandShakeProtocolDart
issue_tracker: https://github.com/lgualandi/SingleHandShakeProtocolDart/issues
license: LGPL-3.0-only
resolution: workspace
keywords:
  - networking
  - peer-to-peer
  - shsp
  - protocol
  - udp
  - handshake

environment:
  sdk: '>=3.5.0 <4.0.0'

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

dependencies:
  json_annotation: ^4.10.0
  callback_handler: ^0.0.3
  meta: ^1.18.1
  clock_dart: ^1.0.0
  stun: ^1.0.1
  archive: ^3.6.1

dev_dependencies:
  lints: ^6.0.0
  test: ^1.29.0
  index_generator: 4.1.2
  build_runner: ^2.10.5
  json_serializable: ^6.12.0

index_generator:
  exclude:
    - "**/test/**"
  libraries:
    - directory_path: lib
